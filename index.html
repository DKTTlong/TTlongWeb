<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>许愿星 - 遇见美好</title>
    <!-- 引入图标库 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- 引入 Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary-color: #ff7eb9;
            --secondary-color: #ff758c;
            --bg-color: #fff0f6;
            --text-color: #333;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-bottom: 70px;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: var(--white);
            padding: 20px 15px 40px;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            text-align: center;
            position: relative;
            box-shadow: 0 4px 15px rgba(255, 126, 185, 0.3);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .user-info {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 12px;
            background: rgba(255,255,255,0.2);
            padding: 4px 10px;
            border-radius: 20px;
            cursor: pointer;
        }

        .container {
            padding: 0 15px;
            margin-top: -25px;
        }

        .fab-btn {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            box-shadow: 0 4px 10px rgba(255, 117, 140, 0.4);
            cursor: pointer;
            z-index: 100;
            transition: transform 0.2s;
        }
        .fab-btn:active {
            transform: scale(0.95);
        }

        .wish-card {
            background: var(--white);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            position: relative;
            overflow: hidden;
        }

        .wish-card.vip-blur {
            filter: blur(4px);
            user-select: none;
            pointer-events: none;
        }

        .wish-header {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: #ddd;
            margin-right: 10px;
            background-size: cover;
        }

        .user-name {
            font-weight: 600;
            font-size: 14px;
        }

        .time {
            font-size: 10px;
            color: #999;
            margin-left: auto;
        }

        .wish-content {
            font-size: 15px;
            line-height: 1.5;
            color: #444;
            margin-bottom: 10px;
        }

        .wish-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            color: #999;
            font-size: 12px;
        }

        .action-item {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }
        
        .action-item.liked {
            color: var(--secondary-color);
        }

        .vip-mask {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            backdrop-filter: blur(2px);
        }

        .vip-icon {
            font-size: 30px;
            color: #ffd700;
            margin-bottom: 8px;
        }

        .vip-text {
            font-size: 14px;
            font-weight: bold;
            color: var(--secondary-color);
        }

        .vip-btn {
            margin-top: 8px;
            padding: 4px 12px;
            background: var(--secondary-color);
            color: white;
            border-radius: 12px;
            font-size: 12px;
            border: none;
            cursor: pointer;
        }

        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: var(--white);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #eee;
            z-index: 99;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #999;
            font-size: 10px;
            cursor: pointer;
        }

        .tab-item.active {
            color: var(--primary-color);
        }

        .tab-item i {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background: white;
            width: 80%;
            max-width: 300px;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            animation: popIn 0.3s ease;
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-input {
            width: 100%;
            padding: 10px;
            margin: 15px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
        }

        .modal-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            width: 100%;
            font-size: 14px;
            cursor: pointer;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="user-info" id="userInfo">
            <i class="fas fa-user"></i> 游客
        </div>
        <h1>✨ 许愿星</h1>
        <p>写下你的愿望，让宇宙听见</p>
    </div>

    <div class="container" id="wish-list">
        <div class="loading">正在加载愿望...</div>
    </div>

    <div class="fab-btn" id="fabButton">
        <i class="fas fa-plus"></i>
    </div>

    <div class="tab-bar">
        <div class="tab-item active"><i class="fas fa-home"></i><span>首页</span></div>
        <div class="tab-item"><i class="fas fa-compass"></i><span>发现</span></div>
        <div class="tab-item"><i class="fas fa-comment-dots"></i><span>消息</span></div>
        <div class="tab-item"><i class="fas fa-user"></i><span>我的</span></div>
    </div>

    <div class="modal" id="publishModal">
        <div class="modal-content">
            <h3>✨ 许个愿吧</h3>
            <input type="text" id="usernameInput" class="modal-input" placeholder="你的昵称 (必填)" style="margin-bottom: 10px;">
            <textarea class="modal-input" id="wishInput" rows="4" placeholder="在这里写下你的愿望..."></textarea>
            <button class="modal-btn" id="addWishBtn">发布愿望</button>
            <button style="margin-top:10px; background:none; border:none; color:#999;" id="cancelModalBtn">取消</button>
        </div>
    </div>

    <script>
        // ================= ⚠️ 重要：请在此处填写你的 Supabase 信息 ⚠️ =================
        
        // 1. 填入你的 Project URL (例如: https://xxxxx.supabase.co)
        const SUPABASE_URL = 'https://nbiiazenwummrunqntlt.supabase.co'; 
        
        // 2. 填入你的 Publishable Key (以 sb_publishable_ 开头的那串长字符)
        const SUPABASE_KEY = 'sb_publishable_S4L95iYE8AUhMHeZQKNkkA_1sQDQKDO'; 
        
        // ===========================================================================

        // 初始化 Supabase 客户端
        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        document.addEventListener('DOMContentLoaded', function() {
            const wishListEl = document.getElementById('wish-list');
            const fabButton = document.getElementById('fabButton');
            const publishModal = document.getElementById('publishModal');
            const addWishBtn = document.getElementById('addWishBtn');
            const cancelModalBtn = document.getElementById('cancelModalBtn');
            const wishInput = document.getElementById('wishInput');
            const usernameInput = document.getElementById('usernameInput');
            const userInfo = document.getElementById('userInfo');

            // 1. 加载数据函数
            async function loadWishes() {
                wishListEl.innerHTML = '<div class="loading">正在加载愿望...</div>';
                
                // 从 Supabase 查询数据，按时间倒序
                const { data, error } = await _supabase
                    .from('wishes')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) {
                    console.error('Error loading wishes:', error);
                    wishListEl.innerHTML = '<div class="loading" style="color:red">加载失败<br><small>' + error.message + '</small></div>';
                    return;
                }

                renderWishes(data || []);
            }

            // 2. 渲染列表函数
            function renderWishes(wishes) {
                wishListEl.innerHTML = '';
                if (wishes.length === 0) {
                    wishListEl.innerHTML = '<div class="loading">还没有愿望，快来发第一个吧！</div>';
                    return;
                }

                wishes.forEach(wish => {
                    const card = document.createElement('div');
                    card.className = 'wish-card';
                    
                    // 简单的 VIP 模拟逻辑：如果内容包含 "秘密" 两个字，就模糊
                    const isVip = wish.content && wish.content.includes('秘密'); 
                    if (isVip) card.classList.add('vip-blur');

                    const vipMask = isVip ? `
                        <div class="vip-mask">
                            <i class="fas fa-crown vip-icon"></i>
                            <div class="vip-text">会员专享内容</div>
                            <button class="vip-btn" onclick="alert('开通会员即可查看！')">立即解锁</button>
                        </div>
                    ` : '';

                    // 随机头像生成
                    const avatarUrl = `https://api.dicebear.com/7.x/avataaars/svg?seed=${wish.username || 'Anon'}`;

                    // 格式化时间
                    let timeStr = '刚刚';
                    if(wish.created_at) {
                        const date = new Date(wish.created_at);
                        timeStr = `${date.getMonth()+1}月${date.getDate()}日 ${date.getHours()}:${String(date.getMinutes()).padStart(2, '0')}`;
                    }

                    card.innerHTML = `
                        <div class="wish-header">
                            <div class="avatar" style="background-image: url('${avatarUrl}')"></div>
                            <div class="user-name">${wish.username || '匿名'}</div>
                            <div class="time">${timeStr}</div>
                        </div>
                        <div class="wish-content">${wish.content || ''}</div>
                        ${vipMask}
                        <div class="wish-actions">
                            <div class="action-item" onclick="handleLike(${wish.id}, ${wish.likes || 0}, this)">
                                <i class="far fa-heart"></i> <span>${wish.likes || 0}</span>
                            </div>
                            <div class="action-item"><i class="far fa-comment"></i> <span>评论</span></div>
                            <div class="action-item"><i class="far fa-share-square"></i> <span>分享</span></div>
                        </div>
                    `;
                    wishListEl.appendChild(card);
                });
            }

            // 3. 处理点赞 (仅前端模拟，未写入数据库以防频繁操作)
            window.handleLike = (id, currentLikes, element) => {
                element.classList.toggle('liked');
                const icon = element.querySelector('i');
                const countSpan = element.querySelector('span');
                
                let newCount = currentLikes + (element.classList.contains('liked') ? 1 : -1);
                countSpan.innerText = newCount;
                icon.classList.toggle('far');
                icon.classList.toggle('fas');
            };

            // 4. 发布愿望 (写入数据库)
            async function addWish() {
                const username = usernameInput.value.trim();
                const text = wishInput.value.trim();
                
                if (!username) { alert("请填写昵称哦~"); return; }
                if (!text) { alert("请先写下愿望哦~"); return; }

                // 按钮变 Loading 状态
                const originalBtnText = addWishBtn.innerText;
                addWishBtn.innerText = "发布中...";
                addWishBtn.disabled = true;

                // 插入数据到 Supabase
                const { data, error } = await _supabase
                    .from('wishes')
                    .insert([
                        { username: username, content: text, likes: 0 }
                    ]);

                addWishBtn.innerText = originalBtnText;
                addWishBtn.disabled = false;

                if (error) {
                    alert("发布失败：" + error.message);
                    console.error(error);
                } else {
                    wishInput.value = '';
                    // 保存昵称到本地，方便下次
                    localStorage.setItem('wishing_username', username);
                    userInfo.innerHTML = `<i class="fas fa-user"></i> ${username}`;
                    
                    closePublishModal();
                    alert("发布成功！");
                    loadWishes(); // 重新加载列表
                }
            }

            // 事件绑定
            fabButton.addEventListener('click', () => {
                // 尝试从本地存储读取上次输入的昵称
                const lastUser = localStorage.getItem('wishing_username');
                if(lastUser) usernameInput.value = lastUser;
                openPublishModal();
            });
            
            addWishBtn.addEventListener('click', addWish);
            cancelModalBtn.addEventListener('click', closePublishModal);
            window.addEventListener('click', (e) => { if(e.target === publishModal) closePublishModal(); });

            function openPublishModal() { publishModal.style.display = 'flex'; }
            function closePublishModal() { publishModal.style.display = 'none'; }

            // 初始化
            loadWishes();
        });
    </script>
</body>
</html>
