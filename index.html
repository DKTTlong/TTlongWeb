<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>羊了个羊 - 轻松解压版</title>
    <style>
        :root {
            --bg-color: #e0f7fa; /* 更清新的背景色 */
            --slot-bg: #8d6e63;
            --card-size: 50px; /* 稍微大一点，好点 */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: "Microsoft YaHei", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .header {
            margin-top: 15px;
            text-align: center;
            color: #006064;
        }
        .header h1 { margin: 0; font-size: 22px; }
        .header p { margin: 5px 0; font-size: 14px; color: #00838f; }

        #game-board {
            position: relative;
            width: 360px;
            height: 360px;
            margin: 10px auto;
        }

        .card {
            width: var(--card-size);
            height: var(--card-size);
            background: #fff;
            border-radius: 10px;
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            box-shadow: 0 4px 0 #cfd8dc, 0 5px 5px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s, top 0.3s, left 0.3s;
            z-index: 10;
            border: 2px solid #fff;
            box-sizing: border-box;
        }

        .card:active { transform: scale(0.95); }

        /* 轻松版：被遮挡的牌只是稍微变灰，不完全黑死 */
        .card.disabled {
            filter: brightness(0.75) grayscale(0.3);
            cursor: not-allowed;
            pointer-events: none;
            box-shadow: 0 2px 0 #b0bec5;
        }

        #slot-container {
            width: 380px;
            height: 80px;
            background: var(--slot-bg);
            border-radius: 15px;
            border: 5px solid #5d4037;
            display: flex;
            align-items: center;
            justify-content: flex-start; /* 左对齐 */
            padding: 0 15px;
            box-sizing: border-box;
            margin-bottom: 10px;
            position: relative;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.4);
        }

        .slot-card {
            width: 46px;
            height: 46px;
            background: #fff;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            margin-right: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            flex-shrink: 0;
            cursor: pointer; /* 允许点击撤回 */
        }
        
        .slot-card:hover { transform: translateY(-3px); }

        @keyframes popIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .tools {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .tool-btn {
            background: #ffeb3b;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            color: #5d4037;
            cursor: pointer;
            box-shadow: 0 4px 0 #fbc02d;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
        }
        .tool-btn:active { transform: translateY(4px); box-shadow: none; }
        .tool-btn:disabled { background: #cfd8dc; color: #90a4ae; box-shadow: none; cursor: not-allowed; transform: none; }

        .modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center; align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #fff;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            animation: popIn 0.4s;
            max-width: 80%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .modal h2 { margin-top: 0; font-size: 24px; }
        .restart-btn {
            background: #009688; color: white; border: none;
            padding: 12px 30px; border-radius: 25px;
            font-size: 16px; cursor: pointer; margin-top: 20px;
            box-shadow: 0 4px 0 #00796b;
        }
        .restart-btn:active { transform: translateY(4px); box-shadow: none; }

        .fail-msg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(244, 67, 54, 0.8);
            display: none;
            justify-content: center; align-items: center;
            color: white; font-weight: bold; font-size: 28px;
            z-index: 50; border-radius: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🐑 羊了个羊 (轻松版) 🐑</h1>
        <p>布局稀疏，道具多多，放心玩！</p>
    </div>

    <div id="game-board">
        <div class="fail-msg" id="fail-msg">槽位已满!</div>
    </div>

    <div class="tools">
        <button class="tool-btn" onclick="shuffleCards()" id="btn-shuffle">
            🔄 洗牌 (<span id="shuffle-count">5</span>)
        </button>
        <button class="tool-btn" onclick="undoMove()" id="btn-undo">
            ⬅️ 撤回 (<span id="undo-count">5</span>)
        </button>
    </div>

    <div id="slot-container"></div>

    <div class="modal" id="game-modal">
        <div class="modal-content">
            <h2 id="modal-title">恭喜过关!</h2>
            <p id="modal-desc">太轻松了，再来一局？</p>
            <button class="restart-btn" onclick="initGame()">再玩一次</button>
        </div>
    </div>

<script>
    // 轻松版配置
    const CONFIG = {
        cardSize: 50,
        totalCards: 60, // 总数少一点
        slotMax: 7,
        types: ['🍎', '🍌', '🍇', '🍉', '🍓', '🍒', '🍑', '🍍', '🥝', '🥥', '🥕', '🌽'],
        startShuffle: 5, // 初始5次洗牌
        startUndo: 5     // 初始5次撤回
    };

    let state = {
        cards: [],
        slot: [],
        history: [],
        shuffleCount: CONFIG.startShuffle,
        undoCount: CONFIG.startUndo,
        isGameOver: false
    };

    const boardEl = document.getElementById('game-board');
    const slotEl = document.getElementById('slot-container');
    const modalEl = document.getElementById('game-modal');
    const failMsgEl = document.getElementById('fail-msg');

    function initGame() {
        state = {
            cards: [],
            slot: [],
            history: [],
            shuffleCount: CONFIG.startShuffle,
            undoCount: CONFIG.startUndo,
            isGameOver: false
        };
        
        boardEl.innerHTML = '<div class="fail-msg" id="fail-msg">槽位已满!</div>';
        slotEl.innerHTML = '';
        modalEl.style.display = 'none';
        updateToolUI();

        generateLevel();
        renderBoard();
        checkAvailability();
    }

    function generateLevel() {
        let deck = [];
        const typesCount = Math.floor(CONFIG.totalCards / 3);
        for (let i = 0; i < typesCount; i++) {
            const type = CONFIG.types[i % CONFIG.types.length];
            deck.push(type, type, type);
        }
        deck.sort(() => Math.random() - 0.5);

        // 轻松版布局逻辑：
        // 只有两层，且分布范围更广
        const layers = [
            { count: 30, spread: 100, z: 1 }, // 底层：范围大 (spread 100)
            { count: 30, spread: 70, z: 2 }   // 顶层：范围稍小，但也不密集
        ];

        let idCounter = 0;
        layers.forEach(layer => {
            for (let i = 0; i < layer.count; i++) {
                const angle = Math.random() * Math.PI * 2;
                // 使用随机半径，让分布更自然，不像同心圆那么死板
                const radius = Math.random() * layer.spread; 
                const x = 180 + Math.cos(angle) * radius - CONFIG.cardSize/2;
                const y = 180 + Math.sin(angle) * radius - CONFIG.cardSize/2;
                
                // 增加随机偏移，避免完美重叠
                const offsetX = (Math.random() - 0.5) * 20; 
                const offsetY = (Math.random() - 0.5) * 20;

                state.cards.push({
                    id: idCounter++,
                    type: deck.pop(),
                    x: x + offsetX,
                    y: y + offsetY,
                    z: layer.z,
                    el: null,
                    removed: false
                });
            }
        });
    }

    function renderBoard() {
        state.cards.forEach(card => {
            if (card.removed) return;
            const el = document.createElement('div');
            el.className = 'card';
            el.innerText = card.type;
            el.style.left = card.x + 'px';
            el.style.top = card.y + 'px';
            el.style.zIndex = card.z;
            el.dataset.id = card.id;
            el.onclick = () => handleCardClick(card);
            boardEl.appendChild(el);
            card.el = el;
        });
    }

    function checkAvailability() {
        state.cards.forEach(card => {
            if (card.removed || !card.el) return;
            let isCovered = false;
            const r1 = { x: card.x, y: card.y, w: CONFIG.cardSize, h: CONFIG.cardSize, z: card.z };
            
            for (let other of state.cards) {
                if (other.id === card.id || other.removed || other.z <= card.z) continue;
                const r2 = { x: other.x, y: other.y, w: CONFIG.cardSize, h: CONFIG.cardSize };
                
                // 碰撞检测
                const overlap = !(r1.x + r1.w - 5 < r2.x || r1.x + 5 > r2.x + r2.w || 
                                r1.y + r1.h - 5 < r2.y || r1.y + 5 > r2.y + r2.h);
                
                if (overlap) { isCovered = true; break; }
            }

            if (isCovered) card.el.classList.add('disabled');
            else card.el.classList.remove('disabled');
        });
    }

    function handleCardClick(card) {
        if (state.isGameOver) return;
        if (card.el.classList.contains('disabled')) return;
        if (state.slot.length >= CONFIG.slotMax) {
            showFail();
            return;
        }

        state.history.push({ action: 'move_to_slot', cardId: card.id });

        card.el.style.transition = 'all 0.3s';
        card.el.style.opacity = '0';
        card.el.style.transform = 'scale(0.5)';
        setTimeout(() => { if(card.el) card.el.remove(); }, 300);

        addToSlot(card);
        checkAvailability();
    }

    function addToSlot(card) {
        state.slot.push(card);
        renderSlot();
        checkMatch();
    }

    function renderSlot() {
        slotEl.innerHTML = '';
        state.slot.forEach(card => {
            const el = document.createElement('div');
            el.className = 'slot-card';
            el.innerText = card.type;
            el.onclick = () => undoMoveByCard(card.id);
            slotEl.appendChild(el);
        });
    }

    function checkMatch() {
        const counts = {};
        state.slot.forEach(card => counts[card.type] = (counts[card.type] || 0) + 1);

        for (let type in counts) {
            if (counts[type] === 3) {
                setTimeout(() => eliminateType(type), 200);
                return;
            }
        }

        if (state.slot.length >= CONFIG.slotMax) {
            setTimeout(() => {
                if (state.slot.length >= CONFIG.slotMax && !checkAnyMatch()) showFail();
            }, 300);
        }

        const remaining = state.cards.filter(c => !c.removed && c.el && document.body.contains(c.el));
        if (state.slot.length === 0 && remaining.length === 0) showWin();
    }

    function checkAnyMatch() {
        const counts = {};
        state.slot.forEach(card => counts[card.type] = (counts[card.type] || 0) + 1);
        return Object.values(counts).some(c => c >= 3);
    }

    function eliminateType(type) {
        const toRemove = state.slot.filter(c => c.type === type);
        if (toRemove.length !== 3) return;

        state.history.push({ action: 'eliminate', cards: toRemove.map(c => c.id) });
        state.slot = state.slot.filter(c => c.type !== type);
        toRemove.forEach(c => c.removed = true);
        renderSlot();

        const activeCards = state.cards.filter(c => !c.removed);
        if (activeCards.length === 0 && state.slot.length === 0) showWin();
    }

    function undoMove() {
        if (state.undoCount <= 0 || state.history.length === 0 || state.isGameOver) return;
        const lastAction = state.history.pop();

        if (lastAction.action === 'move_to_slot') {
            if (state.slot.length === 0) return;
            const card = state.slot.pop();
            if (card.el) {
                card.el.style.opacity = '1';
                card.el.style.transform = 'scale(1)';
                boardEl.appendChild(card.el);
            }
            state.undoCount--;
            renderSlot();
            checkAvailability();
            updateToolUI();
        } else if (lastAction.action === 'eliminate') {
            // 简单处理：撤销消除，把牌放回卡槽末尾
            lastAction.cards.forEach(id => {
                const card = state.cards.find(c => c.id === id);
                if(card) { card.removed = false; state.slot.push(card); }
            });
            state.undoCount--;
            renderSlot();
            updateToolUI();
        }
    }

    function undoMoveByCard(cardId) {
        if (state.undoCount <= 0 || state.isGameOver) return;
        const index = state.slot.findIndex(c => c.id === cardId);
        if (index === -1) return;

        const card = state.slot.splice(index, 1)[0];
        if (card.el) {
            card.el.style.opacity = '1';
            card.el.style.transform = 'scale(1)';
            boardEl.appendChild(card.el);
        }
        state.undoCount--;
        renderSlot();
        checkAvailability();
        updateToolUI();
    }

    function shuffleCards() {
        if (state.shuffleCount <= 0 || state.isGameOver) return;
        const availableCards = state.cards.filter(c => !c.removed && c.el && !state.slot.includes(c));
        if (availableCards.length === 0) return;

        const coords = availableCards.map(c => ({x: c.x, y: c.y}));
        for (let i = coords.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [coords[i], coords[j]] = [coords[j], coords[i]];
        }

        availableCards.forEach((card, index) => {
            card.x = coords[index].x;
            card.y = coords[index].y;
            if (card.el) {
                card.el.style.left = card.x + 'px';
                card.el.style.top = card.y + 'px';
                card.el.style.transition = 'all 0.5s ease-out';
                card.el.style.transform = 'rotate(360deg) scale(1.1)';
                setTimeout(() => card.el.style.transform = 'rotate(0deg) scale(1)', 500);
            }
        });

        state.shuffleCount--;
        updateToolUI();
        setTimeout(checkAvailability, 550);
    }

    function updateToolUI() {
        document.getElementById('shuffle-count').innerText = state.shuffleCount;
        document.getElementById('undo-count').innerText = state.undoCount;
        document.getElementById('btn-shuffle').disabled = state.shuffleCount <= 0;
        document.getElementById('btn-undo').disabled = state.undoCount <= 0;
    }

    function showFail() {
        if (state.isGameOver) return;
        state.isGameOver = true;
        failMsgEl.style.display = 'flex';
        setTimeout(() => {
            document.getElementById('modal-title').innerText = "哎呀，槽满啦!";
            document.getElementById('modal-title').style.color = "#d32f2f";
            document.getElementById('modal-desc').innerText = "没关系，这局有点可惜，再试一次吧！";
            modalEl.style.display = 'flex';
        }, 1000);
    }

    function showWin() {
        if (state.isGameOver) return;
        state.isGameOver = true;
        document.getElementById('modal-title').innerText = "🎉 通关成功! 🎉";
        document.getElementById('modal-title').style.color = "#009688";
        document.getElementById('modal-desc').innerText = "这也太简单了吧！你是天才！";
        modalEl.style.display = 'flex';
    }

    initGame();
</script>
</body>
</html>
