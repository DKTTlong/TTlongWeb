<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>许愿星 - 遇见美好</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- 引入 Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- 引入自定义样式 -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="user-info" id="userInfo">
            <i class="fas fa-user-circle"></i> <span id="userNameDisplay">游客</span>
        </div>
        <h1>✨ 许愿星</h1>
        <p>写下你的愿望，让宇宙听见</p>
    </div>

    <!-- Views -->
    <!-- 首页 -->
    <div class="container" id="home-view">
        <div class="loading">正在加载愿望...</div>
    </div>

    <!-- 发现视图 (随机许愿) -->
    <div id="discover-view" class="view-container" style="display:none; padding: 20px;">
        <div style="text-align:center; margin-top: 40px;">
            <h2 style="margin-bottom: 10px; color: #ffecd2;">🔮 宇宙指引</h2>
            <p style="color: #aaa; margin-bottom: 30px;">点击卡片，接收来自宇宙的随机愿望</p>
            
            <!-- 随机卡片容器 -->
            <div id="randomCard" class="wish-card" style="max-width: 350px; margin: 0 auto; cursor: pointer; transition: transform 0.3s; position: relative; min-height: 200px; display: flex; flex-direction: column; justify-content: center; align-items: center;">
                <!-- 默认状态 -->
                <div id="randomPlaceholder">
                    <i class="fas fa-star" style="font-size: 50px; color: var(--accent-color); margin-bottom: 20px;"></i>
                    <p>点击抽取</p>
                </div>
                
                <!-- 内容状态 (JS 控制显示) -->
                <div id="randomContent" style="display:none; width: 100%;">
                    <h4 id="randomUser" style="color: var(--accent-color); margin-bottom: 10px;"></h4>
                    <p id="randomText" style="font-size: 1.1rem; line-height: 1.6; color: #fff;"></p>
                    <div class="wish-meta" style="margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px;">
                        <span id="randomDate"></span>
                    </div>
                </div>
            </div>

            <button id="drawAgainBtn" class="modal-btn" style="max-width: 200px; margin-top: 30px; background: linear-gradient(45deg, #ff9a9e, #fad0c4); color: #333;">
                🔄 再抽一次
            </button>
        </div>
    </div>

    <!-- ✅ 修复后的：我的视图 (只有一套代码，结构清晰) -->
    <div id="my-view" class="view-container" style="display:none;">
        
        <!-- ✅ 修复后的：个人资料编辑区 -->
<div id="profileSection" style="
    padding: 25px; 
    background: #fff; 
    border-radius: 12px; 
    margin: 20px auto; /* 上下20px，左右自动居中 */
    box-shadow: 0 4px 15px rgba(0,0,0,0.08); /* 更柔和的阴影 */
    max-width: 400px; /* 🔑 关键：限制最大宽度 */
    width: 90%; /* 在小屏幕上保持一定边距 */
">
    <h3 style="margin-top:0; color:#333; text-align:center;">个人资料</h3>
    
    <!-- 头像展示 -->
    <div style="text-align:center; margin-bottom: 20px;">
        <div id="myAvatar" style="width:80px;height:80px;background:#f0f0f0;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;overflow:hidden; border: 3px solid #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
            <i class="fas fa-user" style="font-size:40px;color:#ccc;"></i>
        </div>
        <div id="avatarPreview" style="margin-top:8px; font-size:13px; color:#666;"></div>
    </div>
    
    <!-- 表单输入 -->
    <div style="margin-bottom:15px;">
        <label style="display:block;margin-bottom:8px;font-weight:600;font-size:14px;color:#555;">昵称</label>
        <input type="text" id="profileUsernameInput" placeholder="输入你的昵称" style="width:100%;padding:12px;border:1px solid #e0e0e0;border-radius:8px;box-sizing:border-box; font-size: 15px; transition: border-color 0.3s;" onfocus="this.style.borderColor='#6a11cb'" onblur="this.style.borderColor='#e0e0e0'">
    </div>

    <div style="margin-bottom:20px;">
        <label style="display:block;margin-bottom:8px;font-weight:600;font-size:14px;color:#555;">更换头像</label>
        <input type="file" id="avatarFileInput" accept="image/*" style="width:100%; font-size:14px; color:#666;">
    </div>

    <!-- 保存按钮 -->
    <button id="saveProfileBtn" style="width:100%;padding:14px;background:linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);color:white;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer; box-shadow: 0 4px 10px rgba(106, 17, 203, 0.3); transition: transform 0.2s, box-shadow 0.2s;" onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 15px rgba(106, 17, 203, 0.4)'" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 10px rgba(106, 17, 203, 0.3)'">
        保存修改
    </button>
</div>




        <!-- 2. 我的愿望列表区 (唯一的 id="myWishList") -->
        <h3 style="color:#333; border-top:1px solid #eee; padding-top:20px;">我的愿望</h3>
        <div id="myWishList" style="margin-top:15px; min-height: 100px;">
            <!-- 愿望卡片将在这里渲染，或未登录时显示登录引导 -->
            <p style="text-align:center; color:#999; padding:20px;">加载中...</p>
        </div>
        
        <!-- 3. 退出按钮 (唯一的 id="logoutBtn") -->
        <div style="margin-top: 40px; padding-bottom: 30px; text-align: center;">
            <button id="logoutBtn" style="
                background-color: #ff4757; 
                color: white; 
                border: none; 
                padding: 12px 30px; 
                border-radius: 25px; 
                font-size: 16px; 
                cursor: pointer;
                box-shadow: 0 4px 6px rgba(255, 71, 87, 0.3);
                transition: transform 0.2s;
            " onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                <i class="fas fa-sign-out-alt"></i> 退出登录
            </button>
        </div>
    </div>
    <!-- ⚠️ 注意：之前代码中 #my-view 后面还有一大堆重复的 HTML，已全部删除！ -->

    <!-- Buttons & Bars -->
    <div class="fab-btn" id="fabButton"><i class="fas fa-plus"></i></div>
    
    <div class="tab-bar">
    <div class="tab-item active" data-tab="home"><i class="fas fa-home"></i><span>首页</span></div>
    <div class="tab-item" data-tab="discover"><i class="fas fa-compass"></i><span>发现</span></div>
    <!-- ⬇️ 修改这里：图标改为机器人，文字改为 AI -->
    <div class="tab-item" data-tab="ai"><i class="fas fa-robot"></i><span>AI对话</span></div>
    <div class="tab-item" data-tab="my"><i class="fas fa-user"></i><span>我的</span></div>
	</div>

	<!-- ⬇️ 在 #my-view 之后，添加 AI 对话视图容器 -->
	<div id="ai-view" class="view-container" style="display:none; flex-direction: column; height: calc(100vh - 160px);">
		<!-- 聊天历史区域 -->
		<div id="chatHistory" style="flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px;">
			<!-- 欢迎消息 -->
			<div class="message ai-message" style="align-self: flex-start; background: rgba(255,255,255,0.1); padding: 10px 15px; border-radius: 15px 15px 15px 0; max-width: 80%;">
				👋 你好！我是你的专属 AI 许愿助手。你可以和我聊聊你的愿望，或者让我为你提供一些建议和鼓励！
			</div>
		</div>

		<!-- 输入区域 -->
		<div style="padding: 15px; background: rgba(0,0,0,0.3); display: flex; gap: 10px; align-items: center;">
			<input type="text" id="chatInput" placeholder="输入你的问题..." style="flex: 1; padding: 12px; border-radius: 20px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.5); color: white; outline: none;">
			<button id="sendBtn" style="width: 45px; height: 45px; border-radius: 50%; border: none; background: var(--accent-color); color: #333; cursor: pointer; display: flex; align-items: center; justify-content: center;">
				<i class="fas fa-paper-plane"></i>
			</button>
		</div>
	</div>


    <!-- Modals -->
    <div class="modal" id="publishModal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h3>✨ 许个愿吧</h3>
            <input type="text" id="usernameInput" class="modal-input" placeholder="昵称 (可选)">
            <textarea class="modal-input" id="wishInput" rows="4" placeholder="写下愿望..."></textarea>
            <button class="modal-btn" id="addWishBtn">发布</button>
        </div>
    </div>

     <!-- 登录/注册 模态框 -->
    <div class="modal" id="authModal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            
            <!-- 动态标题 -->
            <h3 id="authModalTitle">登录</h3>
            
            <input type="email" id="emailInput" class="modal-input" placeholder="邮箱地址">
            <input type="password" id="passwordInput" class="modal-input" placeholder="密码">
            
            <!-- 主操作按钮 -->
            <button class="modal-btn" id="authActionBtn">登录</button>
            
            <!-- 切换模式提示 -->
            <p style="margin-top: 15px; font-size: 0.9rem; text-align: center; color: #ccc;">
                <span id="switchAuthText">还没有账号？</span>
                <a href="#" id="toggleAuthModeLink" style="color: var(--accent-color); text-decoration: none; font-weight: bold; margin-left: 5px;">立即注册</a>
            </p>
            
            <!-- 魔法链接选项 (可选，保留作为备选) -->
            <div style="margin-top: 15px; text-align: center;">
                <a href="#" id="useMagicLinkBtn" style="font-size: 0.8rem; color: #888; text-decoration: underline;">使用魔法链接免密登录</a>
            </div>

            <p id="authMessage" style="font-size:12px; margin-top:10px; color:#666; text-align: center;"></p>
        </div>
    </div>

    <!-- 引入入口文件 app.js -->
    <script type="module" src="js/app.js"></script>

</body>
</html>
