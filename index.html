<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 移动端核心适配：解决手机端显示/点击问题 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no, email=no">
    <title>策划生存指南：从入职到背锅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
            -webkit-tap-highlight-color: transparent; /* 移除移动端点击高亮 */
        }

        html, body {
            width: 100%;
            height: 100%;
            min-height: 100vh;
            background: #1a1a1a;
            color: #fff;
            padding: 10px;
            line-height: 1.5;
            overflow-x: hidden;
            touch-action: manipulation; /* 禁用移动端双击缩放等干扰行为 */
        }

        .game-box {
            background: #2a2a2a;
            padding: 20px 16px;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            border: 1px solid #444;
            max-width: 500px;
            width: 100%; /* 强制适配手机宽度 */
            margin: 0 auto;
            min-height: calc(100vh - 20px); /* 占满手机屏幕 */
            display: flex;
            flex-direction: column;
        }

        .title {
            text-align: center;
            font-size: 22px;
            color: #ffcc00;
            margin-bottom: 16px;
        }

        .status {
            display: flex;
            justify-content: space-between;
            background: #333;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-weight: bold;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 13px;
            border: 1px solid #444;
        }

        .avatar-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #444;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            border: 2px solid #666;
        }

        .story {
            font-size: 16px;
            margin-bottom: 20px;
            min-height: 120px;
            background: #333;
            padding: 16px;
            border-radius: 10px;
            border: 1px solid #444;
            line-height: 1.6;
            flex-shrink: 0; /* 防止剧情区被压缩 */
        }

        .options {
            flex-grow: 1; /* 选项区自适应剩余空间 */
        }

        .options button {
            width: 100%;
            padding: 14px 12px;
            margin: 8px 0;
            background: #4285f4;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            text-align: left;
            border: 1px solid #5392ff;
            min-height: 50px;
            -webkit-appearance: none; /* 移除移动端默认按钮样式 */
            appearance: none;
        }

        /* 移动端点击反馈 */
        .options button:active {
            background: #5392ff;
            transform: scale(0.98);
        }

        .ending {
            text-align: center;
            font-size: 18px;
            margin-top: 20px;
            line-height: 1.6;
            padding: 16px;
            border-radius: 10px;
            background: rgba(0,0,0,0.3);
        }

        .restart {
            background: #ff4444 !important;
            text-align: center !important;
            margin-top: 20px;
            font-size: 16px !important;
        }

        .achievement {
            background: #333;
            padding: 12px;
            border-radius: 10px;
            margin-top: 12px;
            border-left: 4px solid #ffcc00;
            font-size: 14px;
        }

        .item-bar {
            background: #333;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 13px;
            border: 1px solid #444;
        }

        .item-click {
            color: #ffcc00;
            font-weight: bold;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 4px;
            display: inline-block;
        }

        .item-click:active {
            background: rgba(255,204,0,0.2);
        }

        .tip {
            color: #aaa;
            font-size: 11px;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="game-box">
        <div class="title">策划生存指南：从入职到背锅</div>
        
        <div class="avatar-group">
            <div class="avatar">👨💼 老板</div>
            <div class="avatar">👨💻 程序</div>
            <div class="avatar">🧪 测试</div>
            <div class="avatar">📊 运营</div>
        </div>

        <div class="status">
            <span>创意：<span id="idea">10</span></span>
            <span>程序：<span id="coder">10</span></span>
            <span>老板：<span id="boss">10</span></span>
            <span>测试：<span id="test">10</span></span>
            <span>运营：<span id="oper">10</span></span>
        </div>

        <div class="item-bar">
            道具（点击使用）：
            <span class="item-click" onclick="useCoffee()">☕咖啡</span> x<span id="coffee">1</span> &nbsp;&nbsp;
            <span class="item-click" onclick="useGuoka()">🃏甩锅卡</span> x<span id="guoka">1</span> &nbsp;&nbsp;
            <span class="item-click" onclick="usePeace()">🤝安抚券</span> x<span id="peace">1</span>
            <div class="tip">💡 咖啡=创意+3 | 甩锅卡=老板+2 | 安抚券=全员好感+2</div>
        </div>

        <div class="story" id="story"></div>
        <div class="options" id="options"></div>
        <div id="achievement"></div>
    </div>

    <script>
        // 游戏核心数据（初始化正确）
        let gameData = {
            idea: 10, coder: 10, boss: 10, test:10, oper:10,
            stage: 0, achievements: [],
            coffee: 1, guoka: 1, peace: 1
        };

        // ========== 道具使用逻辑（无音频，避免跨域问题） ==========
        function useCoffee() {
            if(gameData.coffee <= 0) { 
                alert("☕ 咖啡用完啦！"); 
                return; 
            }
            gameData.coffee--;
            gameData.idea = Math.min(30, gameData.idea + 3);
            updateUI();
            showTip("☕ 使用咖啡！创意值+3！");
        }

        function useGuoka() {
            if(gameData.guoka <= 0) { 
                alert("🃏 甩锅卡用完啦！"); 
                return; 
            }
            gameData.guoka--;
            gameData.boss = Math.min(30, gameData.boss + 2);
            gameData.coder = Math.max(0, gameData.coder - 1);
            updateUI();
            showTip("🃏 使用甩锅卡！老板满意度+2！");
        }

        function usePeace() {
            if(gameData.peace <= 0) { 
                alert("🤝 安抚券用完啦！"); 
                return; 
            }
            gameData.peace--;
            gameData.coder = Math.min(30, gameData.coder + 2);
            gameData.test = Math.min(30, gameData.test + 2);
            gameData.oper = Math.min(30, gameData.oper + 2);
            updateUI();
            showTip("🤝 使用安抚券！全体同事好感+2！");
        }

        function showTip(msg) {
            document.getElementById("achievement").innerHTML = `<div class="achievement">✅ ${msg}</div>`;
        }

        // ========== 剧情数据 ==========
        const storyData = [
            {
                text: "入职第一天，老板把你叫到办公室：“我们要做一款爆款游戏，简单、赚钱、比原神还火，明天给我完整方案。”",
                options: [
                    { text: "自信拍板：放心老板！明天保证交付！", effect: { idea: -2, boss: +3 }, next: 1 },
                    { text: "理性沟通：先梳理需求，今天出初稿，明天细化。", effect: { idea: +2, coder: +1, boss: +2 }, next: 2 },
                    { text: "小声吐槽：这需求神仙也做不出来…", effect: { boss: -5 }, next: 3 }
                ]
            },
            {
                text: "你爽快答应，老板很满意，但程序听到需求后直接沉默了。",
                options: [
                    { text: "和程序一起吐槽老板", effect: { coder: +3, boss: -4 }, next: 4 },
                    { text: "安抚程序：我会协调，咱们慢慢做", effect: { idea: +2, coder: +2 }, next: 4 },
                    { text: "催促程序：赶紧做，别耽误进度", effect: { coder: -3 }, next: 4 }
                ]
            },
            {
                text: "你专业稳重，老板觉得你靠谱，程序也松了口气。",
                options: [
                    { text: "认真原创，设计创新玩法", effect: { idea: +4, coder: +1 }, next: 5 },
                    { text: "参考市面上成功游戏", effect: { idea: -2, boss: +2 }, next: 5 },
                    { text: "随便写写糊弄过去", effect: { idea: -4, boss: -2 }, next: 5 }
                ]
            },
            {
                text: "吐槽被老板听见，他脸色瞬间黑了下来。",
                options: [
                    { text: "立刻道歉，保证努力工作", effect: { boss: -2 }, next: 5 },
                    { text: "硬刚：需求真的不合理！", effect: { boss: -10, coder: +2 }, next: 99 },
                    { text: "甩锅给同事：是他们先吐槽的！", effect: { boss: +1, coder: -3 }, next: 5 }
                ]
            },
            {
                text: "方案提交，老板让你立刻对接程序开发！",
                options: [
                    { text: "耐心对接，细化逻辑文档", effect: { idea: +2, coder: +3 }, next: 6 },
                    { text: "甩锅式指挥：你照着做就行，别问", effect: { coder: -5 }, next: 6 },
                    { text: "不断临时加需求", effect: { idea: +1, coder: -4 }, next: 6 }
                ]
            },
            {
                text: "开发第一天，测试小姐姐找你：“你这个玩法逻辑有漏洞，会出BUG。”",
                options: [
                    { text: "认真修改，完善逻辑", effect: { test: +3, idea: +2 }, next: 7 },
                    { text: "无所谓，上线再说", effect: { test: -4 }, next: 7 },
                    { text: "指责测试找茬", effect: { test: -5 }, next: 7 }
                ]
            },
            {
                text: "开发到一半，老板突然冲过来：“加个一键充值648！不赚钱做什么游戏！”",
                options: [
                    { text: "全力支持老板：马上加！", effect: { boss: +5, coder: -4, idea: -3 }, next: 8 },
                    { text: "劝阻：太氪会劝退玩家", effect: { idea: +4, boss: -2, coder: +2 }, next: 8 },
                    { text: "偷偷让程序拖延开发", effect: { coder: +3, boss: -3 }, next: 8 }
                ]
            },
            {
                text: "运营找到你：“玩家活动太少了，必须加福利！”",
                options: [
                    { text: "同意加福利，平衡体验", effect: { oper: +3, idea: +1 }, next: 9 },
                    { text: "拒绝：福利多了不赚钱", effect: { oper: -4, boss: +2 }, next: 9 },
                    { text: "和运营撕逼吵架", effect: { oper: -5, coder: -2 }, next: 9 }
                ]
            },
            {
                text: "深夜加班，程序摸鱼打游戏，被你撞见。",
                options: [
                    { text: "假装没看见，一起摸鱼", effect: { coder: +4 }, next: 10 },
                    { text: "提醒他赶紧工作", effect: { coder: -2 }, next: 10 },
                    { text: "偷偷告诉老板", effect: { boss: +3, coder: -5 }, next: 10 }
                ]
            },
            {
                text: "玩家在群里骂策划，方案被疯狂吐槽！",
                options: [
                    { text: "虚心接受，紧急优化", effect: { idea: +3, oper: +2 }, next: 11 },
                    { text: "无视玩家，我行我素", effect: { oper: -3 }, next: 11 },
                    { text: "和玩家对喷", effect: { boss: -5, oper: -4 }, next: 11 }
                ]
            },
            {
                text: "公司开会，所有人都在推卸责任！",
                options: [
                    { text: "主动背锅，稳住团队", effect: { boss: +4, coder: +2 }, next: 12 },
                    { text: "疯狂甩锅，保全自己", effect: { boss: +2, coder: -3, test: -3 }, next: 12 },
                    { text: "沉默装死", effect: { boss: -2 }, next: 12 }
                ]
            },
            {
                text: "游戏出现严重BUG，玩家炸锅，老板大怒！",
                options: [
                    { text: "主动承担责任，紧急修复", effect: { boss: +2, test: +3, coder: +2 }, next: 100 },
                    { text: "甩锅给程序：是他们写的代码烂", effect: { boss: +1, coder: -5 }, next: 100 },
                    { text: "甩锅给测试：他们没测出来", effect: { boss: +1, test: -5 }, next: 100 },
                    { text: "集体沉默，谁都不承认", effect: { boss: -3 }, next: 100 }
                ]
            },
            {
                text: "版本终于要上线，全公司都在等结果！",
                options: [
                    { text: "查看最终成绩", effect: {}, next: 100 }
                ]
            }
        ];

        // ========== 结局数据 ==========
        const endings = {
            99: { text: "你顶撞老板，试用期直接被优化。【坏结局：职场炮灰】", color: "#ff4444" },
            100: function() {
                const { idea, coder, boss, test, oper } = gameData;
                const total = idea + coder + boss + test + oper;
                
                let result = { text: "", color: "" };
                if (total >= 85) {
                    unlockAchievement("金牌策划");
                    result = { text: "你平衡各方、创意拉满，游戏火爆全球！你被升为制作人，年薪百万！【真结局：金牌策划大神】", color: "#ffcc00" };
                } else if (boss <= 4) {
                    unlockAchievement("背锅之王");
                    result = { text: "老板对你极度不满，项目失败，你成为唯一背锅侠，被迫离职。【坏结局：背锅之王】", color: "#ff4444" };
                } else if (coder <= 4) {
                    unlockAchievement("全员公敌");
                    result = { text: "程序集体抵制你，开发停滞，你被公司开除。【坏结局：全员公敌】", color: "#ff4444" };
                } else if (test <= 4 && oper <= 4) {
                    unlockAchievement("孤岛策划");
                    result = { text: "测试和运营都讨厌你，你在公司寸步难行，主动辞职。【坏结局：孤岛策划】", color: "#ff4444" };
                } else if (idea >= 28) {
                    unlockAchievement("创意鬼才");
                    result = { text: "你的创意极强，但职场一般，游戏小爆款，你成为知名独立策划。【好结局：创意鬼才】", color: "#42ff80" };
                } else if (boss >= 25) {
                    unlockAchievement("职场精英");
                    result = { text: "你非常会讨好老板，虽然游戏一般，但你升职加薪。【好结局：职场精英】", color: "#42ff80" };
                } else if (total >= 60) {
                    result = { text: "游戏平稳上线，口碑不错，你成功保住工作，升职在望！【好结局：优秀策划】", color: "#4285f4" };
                } else if (total >= 40) {
                    result = { text: "游戏不温不火，你平安保住工作，继续打工。【普通结局：合格社畜】", color: "#4285f4" };
                } else {
                    result = { text: "项目彻底失败，团队解散，你被辞退，重新找工作。【坏结局：失败策划】", color: "#ff4444" };
                }
                return result;
            }
        };

        // ========== 成就系统 ==========
        function unlockAchievement(name) {
            if(!gameData.achievements.includes(name)) {
                gameData.achievements.push(name);
                document.getElementById("achievement").innerHTML += `
                    <div class="achievement">🎉 达成成就：${name}</div>`;
            }
        }

        // ========== UI更新核心函数（适配移动端） ==========
        function updateUI() {
            // 更新数值显示（修复道具初始显示错误）
            document.getElementById("idea").innerText = gameData.idea;
            document.getElementById("coder").innerText = gameData.coder;
            document.getElementById("boss").innerText = gameData.boss;
            document.getElementById("test").innerText = gameData.test;
            document.getElementById("oper").innerText = gameData.oper;

            document.getElementById("coffee").innerText = gameData.coffee;
            document.getElementById("guoka").innerText = gameData.guoka;
            document.getElementById("peace").innerText = gameData.peace;

            // 防止剧情索引越界
            if (gameData.stage >= storyData.length) {
                gameData.stage = storyData.length - 1;
            }
            
            let current = storyData[gameData.stage];
            document.getElementById("story").innerText = current.text;

            let optDom = document.getElementById("options");
            optDom.innerHTML = "";

            // 渲染选项按钮（同时绑定click和touchend，适配移动端）
            current.options.forEach((opt, index) => {
                let btn = document.createElement("button");
                btn.innerText = opt.text;
                // 点击事件（PC+手机通用）
                btn.addEventListener('click', () => chooseOption(index));
                // 触摸事件（专门适配手机）
                btn.addEventListener('touchend', (e) => {
                    e.preventDefault(); // 阻止默认触摸行为（避免双击缩放）
                    chooseOption(index);
                });
                optDom.appendChild(btn);
            });
        }

        // ========== 选择选项逻辑 ==========
        function chooseOption(index) {
            let current = storyData[gameData.stage];
            let opt = current.options[index];

            // 更新数值（加边界保护，防止负数/超限）
            gameData.idea = Math.max(0, Math.min(30, (gameData.idea + (opt.effect.idea || 0))));
            gameData.coder = Math.max(0, Math.min(30, (gameData.coder + (opt.effect.coder || 0))));
            gameData.boss = Math.max(0, Math.min(30, (gameData.boss + (opt.effect.boss || 0))));
            gameData.test = Math.max(0, Math.min(30, (gameData.test + (opt.effect.test || 0))));
            gameData.oper = Math.max(0, Math.min(30, (gameData.oper + (opt.effect.oper || 0))));

            // 随机获得道具
            if(Math.random() > 0.6) {
                let r = Math.random();
                if(r>0.66) gameData.coffee++;
                else if(r>0.33) gameData.guoka++;
                else gameData.peace++;
            }

            // 跳转到结局或下一段剧情
            if (endings[opt.next]) {
                showEnding(opt.next);
            } else {
                gameData.stage = opt.next;
                updateUI();
            }
        }

        // ========== 显示结局 ==========
        function showEnding(endId) {
            let end = endings[endId];
            if (typeof end === "function") {
                end = end();
            }
            document.getElementById("achievement").innerHTML = "";
            document.getElementById("story").innerHTML = `<div class="ending" style="color:${end.color}">${end.text}</div>`;
            
            // 重新开始按钮（适配移动端）
            let restartBtn = document.createElement("button");
            restartBtn.className = "restart";
            restartBtn.innerText = "重新开始游戏";
            restartBtn.addEventListener('click', restart);
            restartBtn.addEventListener('touchend', (e) => {
                e.preventDefault();
                restart();
            });
            
            document.getElementById("options").innerHTML = "";
            document.getElementById("options").appendChild(restartBtn);
        }

        // ========== 重新开始游戏 ==========
        function restart() {
            gameData = { 
                idea: 10, coder: 10, boss: 10, test:10, oper:10, 
                stage: 0, achievements: [], coffee:1, guoka:1, peace:1
            };
            document.getElementById("achievement").innerHTML = "";
            updateUI();
        }

        // ========== 初始化游戏（DOM加载完成后执行，避免移动端加载问题） ==========
        document.addEventListener('DOMContentLoaded', function() {
            updateUI();
        });
    </script>
</body>
</html>
